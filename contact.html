<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>吴荣杰的打球记录 - 联系我</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="contact">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="logo" href="index.html">吴荣杰的打球记录</a>
        <nav class="nav-links">
          <a class="nav-link" data-page="index" href="index.html">首页</a>
          <a class="nav-link" data-page="about" href="about.html">个人介绍</a>
          <a class="nav-link" data-page="record" href="record.html">打球记录</a>
          <a class="nav-link" data-page="moments" href="moments.html">精彩瞬间</a>
          <a class="nav-link" data-page="contact" href="contact.html">联系我</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="section grid-2">
        <article class="card info-card reveal">
          <span class="tag">Contact</span>
          <h1>联系与留言</h1>
          <p>欢迎交流训练方法、比赛心得，也欢迎约球。你可以通过表单留言，我会尽快回复。</p>
          <ul class="list" style="margin-top: 1rem">
            <li>邮箱：wurongjie.basketball@example.com</li>
            <li>微信：WRJ-ball</li>
            <li>抖音：@吴荣杰打球日记</li>
            <li>小红书：吴荣杰篮球训练</li>
          </ul>
        </article>

        <article class="card info-card reveal">
          <h2 class="section-title">给我留言</h2>
          <form id="messageForm" class="contact-form">
            <div class="field">
              <label for="name">你的称呼</label>
              <input id="name" name="name" type="text" placeholder="请输入你的名字" required />
            </div>
            <div class="field">
              <label for="email">邮箱</label>
              <input id="email" name="email" type="email" placeholder="name@example.com" required />
            </div>
            <div class="field">
              <label for="message">留言内容</label>
              <textarea id="message" name="message" placeholder="写下你想交流的内容..." required></textarea>
            </div>
            <button class="btn btn-primary" type="submit">提交留言</button>
            <p id="formFeedback" class="meta"></p>
          </form>
        </article>
      </section>

      <footer class="footer">© 2026 吴荣杰的打球记录 · Contact</footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
